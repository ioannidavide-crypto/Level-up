<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Up System</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
            border: 1px solid #444;
            border-radius: 8px;
        }
        h1 {
            text-align: center;
        }
        .level, .habit {
            margin: 10px 0;
        }
        .stats, .tiers {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #444;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Level Up System</h1>
        <div class="level">
            <h2>Your Level:</h2>
            <p id="level">1</p>
            <p id="xp">XP: 0/<span id="nextLevelXP">100</span></p>
        </div>
        <div class="habits">
            <h2>Habits</h2>
            <div class="habit" id="habit1">Habit 1: <button onclick="completeHabit(1)">Complete</button></div>
            <div class="habit" id="habit2">Habit 2: <button onclick="completeHabit(2)">Complete</button></div>
            <!-- Add more habits as needed -->
        </div>
        <div class="stats">
            <h2>Your Stats</h2>
            <p id="statsView">Total Habits Completed: 0</p>
        </div>
        <div class="tiers">
            <h2>Your Tiers</h2>
            <p id="tierView">Current Tier: Novice</p>
        </div>
    </div>
    <script>
        let level = 1;
        let xp = 0;
        let nextLevelXP = 100;
        let habitsCompleted = 0;
        const statsView = document.getElementById('statsView');
        const levelView = document.getElementById('level');
        const xpView = document.getElementById('xp');
        const nextLevelXPView = document.getElementById('nextLevelXP');

        function completeHabit(habitNumber) {
            habitsCompleted++;
            xp += 10;
            if (xp >= nextLevelXP) {
                levelUp();
            }
            updateStats();
        }

        function levelUp() {
            level++;
            xp = xp - nextLevelXP;
            nextLevelXP *= 1.5;
            levelView.innerText = level;
            nextLevelXPView.innerText = Math.round(nextLevelXP);
            alert('Level Up! You are now level ' + level);
        }

        function updateStats() {
            statsView.innerText = 'Total Habits Completed: ' + habitsCompleted;
            xpView.innerText = 'XP: ' + xp + '/' + nextLevelXP;
        }
    </script>
</body>
</html>
